<!DOCTYPE html>

<style>
:root{
  --dusk:#20241f;
  --dusk-edge:#12140f;
  --ink:#e4e1cf;
  --ink-muted:#8a8d78;
  --lichen-bright:#7d9260;
  --line:#454838;
  --font-carved:'Metamorphous', 'Times New Roman', serif;

  font-size:11px;
